{% extends "base.html" %}{% block content %}
<div class="card"><h2>Fieber</h2><form method="post">
<label>Temperatur (°C)</label><input type="number" name="temperature_c" min="34" max="44" step="0.1" value="37.0" required>
<label>Freitext</label><textarea name="notes" rows="4"></textarea>
<label>Datum</label><input type="date" name="date" value="{{ date_value }}" required>
<label>Uhrzeit</label><input type="time" name="time" value="{{ time_value }}" required>
<button class="big-button" type="submit">Speichern</button></form></div>{% endblock %}
