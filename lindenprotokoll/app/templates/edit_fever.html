{% extends "base.html" %}{% block content %}
<div class="card"><h2>Fieber bearbeiten</h2><form method="post">
<label>Person</label><select name="person_id">{% for p in people %}<option value="{{ p.person_id }}" {% if details.entry.person_id == p.person_id %}selected{% endif %}>{{ p.display_name }}</option>{% endfor %}</select>
<label>Temperatur (°C)</label><input type="number" name="temperature_c" min="34" max="44" step="0.1" value="{{ details.temperature_c }}" required>
<label>Freitext</label><textarea name="notes" rows="4">{{ details.notes or "" }}</textarea>
<label>Datum</label><input type="date" name="date" value="{{ details.entry.date }}" required>
<label>Uhrzeit</label><input type="time" name="time" value="{{ details.entry.time }}" required>
<button class="big-button" type="submit">Aktualisieren</button></form></div>{% endblock %}
